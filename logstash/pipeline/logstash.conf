# logstash/pipeline/logstash.conf
# ──────────────────────────────────────────────────────────────────
# INPUT  – accepts Beats (Filebeat) on 5044 and plain syslog on 5000
# ──────────────────────────────────────────────────────────────────
input {
  beats {
    port => 5044
  }

  tcp {
    port => 5000
    codec => json_lines
    tags => ["tcp-json"]
  }
}

# ──────────────────────────────────────────────────────────────────
# FILTER – enrich / parse common log formats
# ──────────────────────────────────────────────────────────────────
filter {
  # Parse Docker / container logs shipped by Filebeat
  if [container][name] {
    mutate {
      add_field => { "log_source" => "docker" }
    }
  }

  # Parse JSON messages if the message field contains JSON
  if [message] =~ /^\{/ {
    json {
      source  => "message"
      target  => "parsed"
      skip_on_invalid_json => true
    }
  }

  # Grok: generic Apache / Nginx combined log format
  if [log][file][path] =~ "access" {
    grok {
      match => {
        "message" => "%{COMBINEDAPACHELOG}"
      }
      tag_on_failure => ["_grok_parse_failure"]
    }
    date {
      match => [ "timestamp", "dd/MMM/yyyy:HH:mm:ss Z" ]
      remove_field => ["timestamp"]
    }
  }

  # Drop empty heartbeat messages
  if [message] == "" {
    drop {}
  }
}

# ──────────────────────────────────────────────────────────────────
# OUTPUT – write to Elasticsearch
# ──────────────────────────────────────────────────────────────────
output {
  elasticsearch {
    hosts            => ["http://elasticsearch:9200"]
    user             => "elastic"
    password         => "${ELASTIC_PASSWORD}"
    index            => "logstash-%{+YYYY.MM.dd}"
    action           => "create"
    ssl_enabled      => false
  }

  # Uncomment to also print events to the Logstash console (debug)
  # stdout {
  #   codec => rubydebug
  # }
}
